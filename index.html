<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherNow Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="container">
    <header>
      <h1>WeatherNow</h1>
      <div class="search-bar">
        <input type="text" id="city-input" placeholder="Enter city name">
        <button type="button" id="search-btn">Search</button>
      </div>
      <div class="bonus-tools">
        <div id="recent-searches" class="recent-searches"></div>

        <div class="unit-toggle">
          <button type="button" id="celsius-btn" class="unit-btn active">°C</button>
          <button type="button" id="fahrenheit-btn" class="unit-btn">°F</button>
        </div>
      </div>
    </header>
    <div id="error-banner"></div>

    <section class="current-weather-card">
      <h2>Current Weather</h2>
      <div class="weather-content">
        <div class="weather-line">
          <span class="label">City:</span>
          <span id="city-name" class="skeleton skeleton-line value-box"></span>
        </div>

        <div class="weather-line">
          <span class="label">Temperature:</span>
          <span id="temperature" class="skeleton skeleton-line value-box"></span>
        </div>

        <div class="weather-line">
          <span class="label">Description:</span>
          <span id="description" class="skeleton skeleton-line value-box"></span>
        </div>

        <div class="weather-line">
          <span class="label">Humidity:</span>
          <span id="humidity" class="skeleton skeleton-line value-box"></span>
        </div>

        <div class="weather-line">
          <span class="label">Wind Speed:</span>
          <span id="wind-speed" class="skeleton skeleton-line value-box"></span>
        </div>

        <div class="weather-line">
          <span class="label">Time:</span>
          <span id="time" class="skeleton skeleton-line value-box"></span>
        </div>
      </div>
    </section>

    <section class="forecast-section">
      <h2>7-Day Forecast</h2>

      <div class="forecast-row">
        <div class="forecast-card">
          <div id="day-1-name" class="skeleton skeleton-day"></div>
          <div id="day-1-icon" class="skeleton skeleton-icon"></div>
          <div id="day-1-temp" class="skeleton skeleton-small"></div>
        </div>

        <div class="forecast-card">
          <div id="day-2-name" class="skeleton skeleton-day"></div>
          <div id="day-2-icon" class="skeleton skeleton-icon"></div>
          <div id="day-2-temp" class="skeleton skeleton-small"></div>
        </div>

        <div class="forecast-card">
          <div id="day-3-name" class="skeleton skeleton-day"></div>
          <div id="day-3-icon" class="skeleton skeleton-icon"></div>
          <div id="day-3-temp" class="skeleton skeleton-small"></div>
        </div>

        <div class="forecast-card">
          <div id="day-4-name" class="skeleton skeleton-day"></div>
          <div id="day-4-icon" class="skeleton skeleton-icon"></div>
          <div id="day-4-temp" class="skeleton skeleton-small"></div>
        </div>

        <div class="forecast-card">
          <div id="day-5-name" class="skeleton skeleton-day"></div>
          <div id="day-5-icon" class="skeleton skeleton-icon"></div>
          <div id="day-5-temp" class="skeleton skeleton-small"></div>
        </div>

        <div class="forecast-card">
          <div id="day-6-name" class="skeleton skeleton-day"></div>
          <div id="day-6-icon" class="skeleton skeleton-icon"></div>
          <div id="day-6-temp" class="skeleton skeleton-small"></div>
        </div>

        <div class="forecast-card">
          <div id="day-7-name" class="skeleton skeleton-day"></div>
          <div id="day-7-icon" class="skeleton skeleton-icon"></div>
          <div id="day-7-temp" class="skeleton skeleton-small"></div>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
